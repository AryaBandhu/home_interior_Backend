version: '3.9'

services:
  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --reload
    volumes:
      - .:/app
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
    #   - db  # uncomment when switching to PostgreSQL

  celery:
    build: .
    command: celery -A config worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  # PostgreSQL (uncomment when ready):
  # db:
  #   image: postgres:15-alpine
  #   environment:
  #     POSTGRES_DB: roomai
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: yourpassword
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"

volumes:
  media_volume:
  # postgres_data:  # uncomment with PostgreSQL